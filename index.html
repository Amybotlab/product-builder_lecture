<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lottery Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="theme-switcher-container">
            <button id="theme-switcher">Toggle Theme</button>
        </div>
        <h1>Lottery Number Generator</h1>
        <div id="numbers" class="numbers"></div>
        <button id="generate">Generate Numbers</button>

        <div class="form-container">
            <h2>Partnership Inquiry</h2>
            <form action="https://formspree.io/f/xzdkgdvp" method="POST">
                <label for="name">Your Name</label>
                <input type="text" id="name" name="name" required>
                
                <label for="email">Your Email</label>
                <input type="email" id="email" name="email" required>
    
                <label for="message">Message</label>
                <textarea id="message" name="message" rows="4" required></textarea>
                
                <button type="submit">Send</button>
            </form>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
