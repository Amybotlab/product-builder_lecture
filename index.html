<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partnership Inquiry</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="language-switcher">
            <button data-lang="ko">한국어</button>
            <button data-lang="en">English</button>
            <button data-lang="zh">中文</button>
        </div>
        <h1 data-i18n="title">Partnership Inquiry</h1>

        <div class="form-container">
            <h2 data-i18n="form_title">Partnership Inquiry</h2>
            <form action="https://formspree.io/f/xzdkgdvp" method="POST">
                <label for="name" data-i18n="form_name">Your Name</label>
                <input type="text" id="name" name="name" required>
                
                <label for="email" data-i18n="form_email">Your Email</label>
                <input type="email" id="email" name="email" required>
    
                <label for="message" data-i18n="form_message">Message</label>
                <textarea id="message" name="message" rows="4" required></textarea>
                
                <button type="submit" data-i18n="form_submit">Send</button>
            </form>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
